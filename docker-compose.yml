version: '3.9'

services:
  postgres:
    image: postgres:17
    container_name: hrms-postgres
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms_dev
      POSTGRES_DB: hrms
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hrms -d hrms']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrms-network

  redis:
    image: redis:7.4-alpine
    container_name: hrms-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrms-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: hrms-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/hrms
      KC_DB_USERNAME: hrms
      KC_DB_PASSWORD: hrms_dev
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME_STRICT: 'false'
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev --import-realm
    ports:
      - '8080:8080'
    volumes:
      - ./src/infra/keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'exec 3<>/dev/tcp/localhost/8080 && echo -e "GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && cat <&3 | grep -q "200 OK"']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - hrms-network

volumes:
  postgres_data:
  redis_data:

networks:
  hrms-network:
    driver: bridge
